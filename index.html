<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCP League</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #1a73e8; }
    .status { padding: 8px 12px; border-radius: 4px; margin: 10px 0; font-size: 0.9em; }
    .status.connected { background: #e8f5e9; color: #2e7d32; }
    .status.disconnected { background: #fce4ec; color: #c62828; }
    .data-display { background: #f5f5f5; padding: 16px; border-radius: 8px; margin: 20px 0; }
    pre { white-space: pre-wrap; word-break: break-all; }
    button { background: #1a73e8; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 4px; }
    button:hover { background: #1557b0; }
    input, textarea { width: 100%; padding: 8px; margin: 6px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>GCP League</h1>
  <div id="status" class="status disconnected">Firebase: 未接続</div>

  <h2>Dオブジェクト管理</h2>
  <div class="data-display">
    <strong>現在のDオブジェクト (sessionStorage / Firebase 同期):</strong>
    <pre id="d-display">読み込み中...</pre>
  </div>

  <h3>データ更新</h3>
  <div>
    <label>キー: <input type="text" id="input-key" placeholder="例: name" /></label>
    <label>値: <input type="text" id="input-value" placeholder="例: チームA" /></label>
    <button onclick="updateD()">Dオブジェクトを更新</button>
    <button onclick="clearD()">クリア</button>
  </div>

  <!-- Firebase compat CDN -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script>
    // Firebase 設定
    const firebaseConfig = {
      apiKey: "AIzaSyD-Li0Wdq11eWhkBzfFgOX2ZG9qzodv_94",
      projectId: "gcp-league-677e9",
      databaseURL: "https://gcp-league-677e9-default-rtdb.asia-southeast1.firebasedatabase.app",
    };

    // Firebase 初期化
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const D_SESSION_KEY = "D";
    const D_REF = db.ref("D");

    // --- sessionStorage ヘルパー ---
    function getD() {
      try {
        return JSON.parse(sessionStorage.getItem(D_SESSION_KEY)) || {};
      } catch {
        return {};
      }
    }

    function setD(value) {
      sessionStorage.setItem(D_SESSION_KEY, JSON.stringify(value));
      renderD(value);
    }

    function renderD(data) {
      document.getElementById("d-display").textContent = JSON.stringify(data, null, 2);
    }

    // --- Firebase → sessionStorage 同期 ---
    D_REF.on("value", (snapshot) => {
      const data = snapshot.val() || {};
      setD(data);
      console.log("[Firebase→sessionStorage] D 同期:", data);
    });

    // --- 接続状態の監視 ---
    db.ref(".info/connected").on("value", (snapshot) => {
      const el = document.getElementById("status");
      if (snapshot.val()) {
        el.textContent = "Firebase: 接続中";
        el.className = "status connected";
      } else {
        el.textContent = "Firebase: 未接続";
        el.className = "status disconnected";
      }
    });

    // --- sessionStorage → Firebase 同期 ---
    function syncDToFirebase(newD) {
      setD(newD);
      D_REF.set(newD)
        .then(() => console.log("[sessionStorage→Firebase] D 同期完了:", newD))
        .catch((err) => console.error("[Firebase] 書き込みエラー:", err));
    }

    // --- UI 操作 ---
    function updateD() {
      const key = document.getElementById("input-key").value.trim();
      const value = document.getElementById("input-value").value.trim();
      if (!key) { alert("キーを入力してください"); return; }

      const current = getD();
      current[key] = value;
      syncDToFirebase(current);

      document.getElementById("input-key").value = "";
      document.getElementById("input-value").value = "";
    }

    function clearD() {
      if (!confirm("Dオブジェクトをすべてクリアしますか？")) return;
      syncDToFirebase({});
    }

    // --- sessionStorage の変化を他タブから検知して Firebase に反映 ---
    window.addEventListener("storage", (e) => {
      if (e.key === D_SESSION_KEY && e.storageArea === sessionStorage) {
        // sessionStorage はタブ間では共有されないが、同一タブ内のコード変更を監視
        const newVal = JSON.parse(e.newValue || "{}");
        D_REF.set(newVal).catch((err) => console.error("[Firebase] 同期エラー:", err));
      }
    });
  </script>
</body>
</html>
